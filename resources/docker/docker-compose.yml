services:
  indexer:
    image: ghcr.io/pivx-ninja/pivx-name-indexer:latest
    container_name: pivx-name-indexer
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - DB_USER=namedbuser
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_NAME=pivx-name
      - RPC_HOST=${RPC_HOST:-}
      - RPC_PORT=${RPC_PORT:-}
      - RPC_USER=${RPC_USER:-}
      - RPC_PASS=${RPC_PASS:-}
      - EVM_RPC_URL=${EVM_RPC_URL:-https://sepolia-rollup.arbitrum.io/rpc}
      - NOTIFY_TYPE=${NOTIFY_TYPE:-}
      - NOTIFY_TG_BOT_KEY=${NOTIFY_TG_BOT_KEY:-}
      - NOTIFY_TG_USER_ID=${NOTIFY_TG_USER_ID:-}
      - LOGS_PATH=/var/log/indexer
    volumes:
      - mysql_data:/var/lib/mysql
      - rr_proxy_db:/opt/rr-proxy/db
      - indexer_logs:/var/log/indexer

volumes:
  mysql_data:
  rr_proxy_db:
  indexer_logs:
